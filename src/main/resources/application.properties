# ‚îÄ‚îÄ Server ‚îÄ‚îÄ
server.port=${PORT:8080}

# ‚îÄ‚îÄ Database ‚îÄ‚îÄ
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/mindshift?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# ‚îÄ‚îÄ JPA ‚îÄ‚îÄ
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ‚îÄ‚îÄ JWT ‚îÄ‚îÄ
app.jwt.secret=${JWT_SECRET:MySuperSecretKeyForJwtAuthentication12345678901234567890}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ‚îÄ‚îÄ Anthropic ‚îÄ‚îÄ
app.anthropic.api-key=${ANTHROPIC_API_KEY:your_anthropic_api_key_here}
app.anthropic.model=claude-sonnet-4-20250514
app.anthropic.max-tokens=1000

# ‚îÄ‚îÄ CORS ‚îÄ‚îÄ
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}